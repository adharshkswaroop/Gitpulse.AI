<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - GitPulse AI</title>
    <style>
        body {
            background: #050505;
            color: #10b981;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.5rem;
            color: #a1a1aa;
        }

        a {
            color: #10b981;
            text-decoration: none;
            border: 1px solid #10b981;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 20px;
            transition: all 0.3s;
        }

        a:hover {
            background: #10b981;
            color: #000;
        }
    </style>
</head>

<body>
    <h1>404</h1>
    <p>System Error: Path Not Found</p>
    <a href="/">Return to Terminal</a>
</body>

</html>
